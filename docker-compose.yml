# Atrium stack.
#   docker compose up --build              -> full stack in containers (frontend + API + plantuml)
#                                             then open http://localhost:8088
#   docker compose up -d plantuml-server   -> just the renderer (for native `dotnet run` + `ng serve`)
#
# Ollama runs natively on the host (http://localhost:11434); the API container reaches it via
# host.docker.internal. Make sure `ollama serve` is running with a model pulled.
services:
  plantuml-server:
    image: plantuml/plantuml-server:jetty
    container_name: atrium-plantuml
    ports:
      - "8080:8080"
    environment:
      - PLANTUML_LIMIT_SIZE=16384
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atrium-api
    depends_on:
      - plantuml-server
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Atrium=Data Source=/data/atrium.db
      - PlantUml__BaseUrl=http://plantuml-server:8080
      - Ollama__BaseUrl=http://host.docker.internal:11434
      - Ollama__DefaultModel=qwen2.5-coder:14b
      - Cors__AllowedOrigins=http://localhost:8088
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - atrium-data:/data
    ports:
      - "5080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atrium-frontend
    depends_on:
      - api
    ports:
      - "8088:80"
    restart: unless-stopped

volumes:
  atrium-data:
